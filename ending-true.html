    <h1>二人で、帰ってきた</h1>

    <p>
	教えてもらった見覚祠に行ったら、衰弱しきった美沙がいた。 <br> 
	私は、すぐに私と美沙の名前を叫んだ。 <br> 
      そしたら雲が晴れるみたいに頭がすっきりして……
    </p>

    <p>
	それからはもう、必死に美沙の身体を支えながら下山した。<br> 
	必死すぎて山から下りた瞬間に通報されて大変だった笑
    </p>

    <p>
	美沙の回復を待って話したんだけど、<br>
	美沙は「伝承を確かめたかった」らしい。
    </p>

    <p>
      人騒がせすぎない？笑
    </p>

    <p>
	祠で見た時、暗い顔してたから心配だったけど、<br>
	もう、大丈夫そう。<br>
	吹っ切れたように見える。
    </p>

    <p>
      私たちは、
      ちゃんと帰ってこられた。
    </p>
