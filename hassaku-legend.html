    <h1>八朔伝承</h1>

    <p>
      八朔村周辺に伝わる古い伝承。
    </p>

    <p>
      村では古くから、
      人の不幸や災いは形を持たず、
      しかし確かに人から人へ移るものだと考えられていた。
    </p>

    <p>
      その災いを鎮める存在として語られていたのが、
      <strong>真渇神</strong>である。
    </p>

    <p>
      真渇神は、人の願いを喰らい、
      記憶を渇望する悪神として伝えられている。
    </p>

    <p>
      名を呼ぶことを避けるため、
      村の古い記録では別の字が当てられている場合もある。
    </p>

    <p>
      しかし、現在確認できる伝承の多くでは、
      真渇神は災厄をもたらすものとして扱われている。
    </p>

    <p>
      なお、本伝承には一部欠落があり、
      現在の八朔村に伝わる内容が原形を保っているかは不明である。
    </p>
