<h1>

あともう少しだけ

</h1>

<p>

ほぼ完成した。

</p>

<p>

自分で言うのもなんだけど、

結構面白いものになったと思う。

</p>

<p>

最初は、

何を作ればいいのかも分からなかった。

</p>

<p>

でも、

気付けばここまで来ていた。

</p>

<p>

本当は、

もっと早く終わると思ってたんだけどね。

</p>

<p>

途中で色々あった。

</p>

<p>

調べれば調べるほど、

知らない方がよかったこともあった。

</p>

<p>

でも、

たぶん、

知らなきゃいけなかった。

</p>

<p>

私だから。

</p>

<p>

……いや。

</p>

<p>

今はそういう話じゃない。

</p>

<p>

あともう少し。

</p>

<p>

けりをつけないと。

</p>
