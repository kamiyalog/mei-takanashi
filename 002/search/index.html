<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>サイト内検索</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <header class="search-header">
    <div class="header-inner">
      <h1 class="site-title">
        <a href="../blog1/index.html">サイト内検索</a>
      </h1>
    </div>
  </header>

  <main class="search-main">

    <section class="search-box">
      <h2>サイト内検索</h2>

      <form id="search-form" class="search-form" method="get">
        <input
          id="search-input"
          name="q"
          type="search"
          placeholder="検索ワードを入力"
          aria-label="検索ワード"
          autocomplete="off"
        >

        <button type="submit">検索</button>
      </form>
    </section>

    <section
      id="search-status"
      class="search-status"
      aria-live="polite"
    ></section>

    <section
      id="search-results"
      class="search-results"
    ></section>

    <p class="back-link">
      <a href="../blog1/index.html">← ブログへ戻る</a>
    </p>

  </main>

  <footer class="site-footer">
    <span>
      このWebサイトの内容はフィクションです。実在の人物・団体とは関係ありません。
    </span>

    <span class="page-no">14/32</span>
  </footer>

  <script src="./search.js"></script>

</body>
</html>
