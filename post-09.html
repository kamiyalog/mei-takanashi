    <h1>HPの作り方</h1>

    <p>
      ARGを作るなら、
      やっぱりそれっぽいホームページが必要だと思う。
    </p>

    <p>
      でも、私はHTMLもCSSもほとんど分からない。
    </p>

    <p>
      とりあえず調べながら、
      それっぽいページを作ってみることにした。
    </p>

    <p>
      文字を置く。
      画像を置く。
      リンクを置く。
    </p>

    <p>
      それだけなら簡単そうに見えるのに、
      実際にやってみると全然思い通りにならない。
    </p>

    <p>
      でも、ちょっとずつ形になっていくのは楽しい。
    </p>

    <p>
      普通のページに見えるけど、
      よく読むと何かがおかしい。
    </p>

    <p>
      そういうものを作れたらいいな。
    </p>
