    <h1>また同じ夢を見た</h1>

    <p>
      また、同じ夢を見た。
    </p>

    <p>
      誰かに名前を呼ばれている気がする。
    </p>

    <p>
      でも、
      その声が誰なのか思い出せない。
    </p>

    <p>
      昨日からずっと、
      あのお守りのことを考えている。
    </p>

    <p>
      呪成就のお守り
    </p>

    <p>
      調べてみたら、
      似た形のお守りを見つけた。
    </p>

    <p>
      <strong>朝霧神社</strong>
    </p>

    <p>
      美沙の遺品の中にも、
      同じようなお守りがあった気がする。
    </p>

    <p>
      いや、
      気がする、じゃない。
    </p>

    <p>
      あった。
    </p>

    <p>
      なんで私の部屋にもあるの。
    </p>

    <p>
      これ、
      いつからあったの。
    </p>

    <p>
      あの子は、
      何をしていたの。
    </p>
