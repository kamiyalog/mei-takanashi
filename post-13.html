    <h1>きついけど完成させたい</h1>

    <p>
      正直、ちょっときつい。
    </p>

    <p>
      体調もあまり良くないし、
      頭もずっとぼんやりしている。
    </p>

    <p>
      でも、ここまで作ったなら、
      ちゃんと完成させたい。
    </p>

    <p>
      途中で投げたら、
      たぶん後悔する。
    </p>

    <p>
      それに、
      これは私が始めたことだから。
    </p>

    <p>
      誰かに頼まれたわけじゃない。
      でも、終わらせないといけない気がする。
    </p>

    <p>
      あと少し。
    </p>

    <p>
      もう少しだけ頑張る。
    </p>
