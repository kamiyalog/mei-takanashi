    <h1>最近疲れることが多い</h1>

    <p>
      最近、ちょっと疲れることが多い。
    </p>

    <p>
      ちゃんと寝てるつもりなんだけど、
      朝起きた時からもう疲れてる。
    </p>

    <p>
      夢見が悪いのかな。
    </p>

    <p>
      でも、
      どんな夢だったかはあまり覚えてない。
    </p>

    <p>
      ただ、起きた時に、
      何か大事なことを忘れているような感じがする。
    </p>

    <p>
      あと、部屋に変なものがあった。
    </p>

    <p>
      これ。
    </p>

    <figure class="article-image">
      <img src="omamori.jpg" alt="部屋にあったお守り">
      <figcaption>いつからあったんだろう。</figcaption>
    </figure>

    <p>
      お守りっぽいけど、
      買った覚えがない。
    </p>

    <p>
      文字が書いてある。
    </p>

    <p>
      「呪成就」
    </p>

    <p>
      いや、普通に怖い。
    </p>

    <p>
      でも、捨てるのもなんか嫌で、
      とりあえず机の上に置いてある。
    </p>

    <p>
      今日は早めに寝る。
    </p>
