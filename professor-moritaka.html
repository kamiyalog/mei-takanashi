  <article class="article-body university-page">

    <p class="deleted-label">月白大学 教員紹介</p>

    <h1>森高 宵（モリタカ ショウ）</h1>

    <p class="post-date">文学部 民俗文化研究室 教授</p>

    <section class="info-block">
      <h2>専門分野</h2>

      <p>
        民俗学、宗教学、地域伝承研究。
      </p>

      <p>
        特に、地方集落に残る祭祀儀礼と、
        呪いに関する伝承を研究対象としている。
      </p>
    </section>

    <section class="info-block">
      <h2>来歴</h2>

      <p>
        1991年、<strong>八朔村</strong> 生まれ。
      </p>

      <p>
        月白大学大学院 文学研究科 修了後、
        民俗資料館勤務を経て、月白大学文学部に着任。
      </p>

      <p>
        現在は、地域信仰における儀礼構造と、
        呪いに関する伝承について研究を行っている。
      </p>
    </section>

    <section class="info-block">
      <h2>主な研究テーマ</h2>

      <ul class="simple-list">
        <li>地域祭祀における代償儀礼</li>
        <li>呪いによる記憶の欠如と成就</li>
        <li>記憶の封印による神格の変化</li>
        <li>地方伝承における神名変化の研究</li>
      </ul>
    </section>

  </article>
