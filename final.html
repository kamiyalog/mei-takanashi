<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>最後のお願い</title>

  <link rel="stylesheet" href="style.css">
</head>

<body data-page="33">

<div id="header"></div>

<main class="article-page">

  <article class="article-body">

    <p class="deleted-label">最終確認</p>

    <h1>お願い</h1>

    <p>
      ここのページが残っているってことは、 <br>
      たぶん、私はもう私のことを忘れてきてるんだと思う。
    </p>

    <p>
      地図は持った。けど、忘れちゃったらあんまり意味ない。
    </p>

    <p>
	だから、お願い。教えて。<br>
	そうすれば私は自分を見失わずにすむから。
    </p>

    <div class="answer-box">

      <label>村の本当の名前</label>
      <input type="text" id="answer1" placeholder="入力例：〇〇村">

      <label>呪いに使った道具</label>
      <input type="text" id="answer2" placeholder="入力例：〇〇〇のお守り">

      <label>神様の本当の名前</label>
      <input type="text" id="answer3" placeholder="入力例：〇〇神">

      <label>儀式を行う場所</label>
      <input type="text" id="answer4" placeholder="入力例：〇〇山の〇〇">

      <label>名前</label>
      <input type="text" id="answer5" placeholder="入力例：〇〇〇〇、または〇〇〇〇と〇〇〇〇">

    </div>

    <div class="center">
      <button class="post-button" onclick="checkAnswer()">
        教える
      </button>
    </div>

  </article>

</main>

<div id="footer"></div>

<script src="include.js"></script>
<script src="search.js"></script>

<script>
function normalize(str) {
  return str.replace(/\s/g, "").replace(/　/g, "");
}

function checkAnswer() {
  const a1 = normalize(document.getElementById("answer1").value);
  const a2 = normalize(document.getElementById("answer2").value);
  const a3 = normalize(document.getElementById("answer3").value);
  const a4 = normalize(document.getElementById("answer4").value);
  const a5 = normalize(document.getElementById("answer5").value);

  const common =
    a1 === "朱祓村" &&
    a2 === "呪成就のお守り" &&
    a3 === "真克神";

  // TRUE END
  if (
    common &&
    a4 === "御影山の見覚祠" &&
    (a5 === "高無メイと新庄美沙" ||
     a5 === "新庄美沙と高無メイ")
  ) {
    window.location.href = "ending-true.html";
    return;
  }

  // GOOD END
  if (
    common &&
    a4 === "御影山の忘れ滝" &&
    a5 === "高無メイ"
  ) {
    window.location.href = "ending-good.html";
    return;
  }

  // BAD END
  window.location.href = "ending-bad.html";
}
</script>


</body>
</html>
