    </p>

    <p>
      見ているだけでも十分楽しいんだけど、
      だんだん思ってしまった。
    </p>

    <p>
      これ、自分でも作れないかな。
    </p>

    <p>
      もちろん、ちゃんとしたものを作るのは大変だと思う。
      サイトも作らないといけないし、
      謎も考えないといけないし、
      ストーリーも破綻しないようにしないといけない。
    </p>

    <p>
      でも、学園祭とかで出せたら面白そう。
    </p>

    <p>
      参加した人が少しずつ手がかりを集めて、
      最後に真相へたどり着くようなやつ。
    </p>

    <p>
      まだ全然ふわっとしてるけど、
      ちょっとだけ考えてみようかな。
    </p>

    <p>
      まずはストーリーからかな。
    </p>
