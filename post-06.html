<h1>

ストーリー決まった

</h1>

<p>

ようやく、
作りたいものの形が見えてきた。

</p>

<p>

やっぱりホラーにする。

</p>

<p>

幽霊とか、
突然何かが襲ってくるとかじゃなくて、

じわじわ怖いやつ。

</p>

<p>

気付いたら、
普通だった日常が
少しずつ壊れていく感じ。

</p>

<p>

そういうのが好き。

</p>

<p>

そういえば、

ひとつ前の記事に最近会ってない友達のこと書いたけど

</p>


<p>

卒業してから、
全然会ってないな。

</p>

<p>

元気にしてるのかな。

</p>

<p>

まあ、
今度調べてみようかな。

</p>
